services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-databridge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=* --workers ${API_WORKERS:-2}"
    ports:
      - "8008:8000"
    volumes:
      - ${DATABRIDGE_SHARED_PATH:-/data/coolify/databridge-shared}:/tmp/databridge
      - backend_uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-databridge}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      UPLOAD_DIR: /app/uploads
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-5}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-500}
      API_WORKERS: ${API_WORKERS:-2}
      EMAIL_VALIDATOR_URL: http://email-validator:8001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      email-validator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: .
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=${CELERY_CONCURRENCY:-5}
    volumes:
      - ${DATABRIDGE_SHARED_PATH:-/data/coolify/databridge-shared}:/tmp/databridge
      - backend_uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-databridge}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      UPLOAD_DIR: /app/uploads
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-5}
      EMAIL_VALIDATOR_URL: http://email-validator:8001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  reacher:
    image: reacherhq/commercial-license-trial:latest
    restart: unless-stopped
    ports:
      - "${REACHER_PORT:-8088}:8080"
    environment:
      RCH__COMMERCIAL_LICENSE_TRIAL__API_TOKEN: ${RCH__COMMERCIAL_LICENSE_TRIAL__API_TOKEN:?RCH__COMMERCIAL_LICENSE_TRIAL__API_TOKEN is required}

  email-validator:
    build:
      context: ../services/email-validator
    restart: unless-stopped
    ports:
      - "8009:8001"
    environment:
      ENVIRONMENT: production
      GENDERIZE_API_KEY: ${GENDERIZE_API_KEY:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:?SMTP_FROM_EMAIL is required}
      SMTP_HELO_NAME: ${SMTP_HELO_NAME:?SMTP_HELO_NAME is required}
      SMTP_CONNECT_TIMEOUT_SECONDS: ${SMTP_CONNECT_TIMEOUT_SECONDS:-8}
      SMTP_READ_TIMEOUT_SECONDS: ${SMTP_READ_TIMEOUT_SECONDS:-8}
      SMTP_MAX_MX_HOSTS: ${SMTP_MAX_MX_HOSTS:-3}
      EMAIL_VALIDATION_CONCURRENCY: ${EMAIL_VALIDATION_CONCURRENCY:-20}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
