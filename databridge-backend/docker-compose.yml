version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pushkar
      POSTGRES_DB: databridge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - /tmp/databridge:/tmp/databridge
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pushkar@db:5432/databridge
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - UPLOAD_DIR=/app/uploads
      - ENCRYPTION_KEY=supersecretkey-change-me-in-production=
      - CELERY_CONCURRENCY=5
      - CORS_ORIGINS=http://localhost:3000
      - MAX_UPLOAD_SIZE_MB=500
      - EMAIL_VALIDATOR_URL=http://email-validator:8001
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=5
    volumes:
      - .:/app
      - /tmp/databridge:/tmp/databridge
    environment:
      - DATABASE_URL=postgresql://user:pushkar@db:5432/databridge
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - UPLOAD_DIR=/app/uploads
      - ENCRYPTION_KEY=supersecretkey-change-me-in-production=
      - CELERY_CONCURRENCY=5
      - EMAIL_VALIDATOR_URL=http://email-validator:8001
    depends_on:
      - db
      - redis

  email-validator:
    build: ../services/email-validator
    ports:
      - "8001:8001"
    volumes:
      - /tmp/databridge:/tmp/databridge
    environment:
      - ENVIRONMENT=development
      - GENDERIZE_API_KEY=${GENDERIZE_API_KEY:-}
      - REACHER_URL=http://reacher:8080
      - REACHER_FROM_EMAIL=${REACHER_FROM_EMAIL:-validator@databridge.local}
      - REACHER_HELLO_NAME=${REACHER_HELLO_NAME:-databridge.local}
      - REACHER_SINGLE_TIMEOUT_SECONDS=${REACHER_SINGLE_TIMEOUT_SECONDS:-30}
      - REACHER_CONCURRENCY=${REACHER_CONCURRENCY:-50}
      - REACHER_USE_BULK=${REACHER_USE_BULK:-false}
    depends_on:
      - reacher

  reacher:
    image: reacherhq/backend:latest
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      - RCH__HTTP_HOST=0.0.0.0
      - RCH__HTTP_PORT=8080
      - RCH__FROM_EMAIL=${REACHER_FROM_EMAIL:-validator@databridge.local}
      - RCH__HELLO_NAME=${REACHER_HELLO_NAME:-databridge.local}
      - RCH_HTTP_HOST=0.0.0.0
      - PORT=8080
      - RCH_ENABLE_BULK=1
      - DATABASE_URL=postgres://user:pushkar@db:5432/databridge
      - RCH__STORAGE__POSTGRES__DB_URL=postgres://user:pushkar@db:5432/databridge
      - RCH_FROM_EMAIL=${REACHER_FROM_EMAIL:-validator@databridge.local}
      - RCH__WORKER__ENABLE=true
      - RCH__WORKER__RABBITMQ__URL=amqp://guest:guest@reacher-rabbitmq:5672
      - RCH__WORKER__RABBITMQ__CONCURRENCY=${REACHER_WORKER_CONCURRENCY:-20}
      - RUST_LOG=info
    depends_on:
      db:
        condition: service_started
      reacher-rabbitmq:
        condition: service_healthy

  reacher-rabbitmq:
    image: rabbitmq:4.0-management
    expose:
      - "5672"
      - "15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  redis_data:
