version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pushkar
      POSTGRES_DB: databridge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
      - /tmp/databridge:/tmp/databridge
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pushkar@db:5432/databridge
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - UPLOAD_DIR=/app/uploads
      - ENCRYPTION_KEY=supersecretkey-change-me-in-production=
      - CELERY_CONCURRENCY=5
      - CORS_ORIGINS=http://localhost:3000
      - MAX_UPLOAD_SIZE_MB=500
      - EMAIL_VALIDATOR_URL=http://email-validator:8001
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=5
    volumes:
      - .:/app
      - /tmp/databridge:/tmp/databridge
    environment:
      - DATABASE_URL=postgresql://user:pushkar@db:5432/databridge
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
      - UPLOAD_DIR=/app/uploads
      - ENCRYPTION_KEY=supersecretkey-change-me-in-production=
      - CELERY_CONCURRENCY=5
      - EMAIL_VALIDATOR_URL=http://email-validator:8001
    depends_on:
      - db
      - redis

  email-validator:
    build: ../services/email-validator
    ports:
      - "8001:8001"
    volumes:
      - /tmp/databridge:/tmp/databridge
    environment:
      - ENVIRONMENT=development
      - GENDERIZE_API_KEY=${GENDERIZE_API_KEY:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-validator@databridge.local}
      - SMTP_HELO_NAME=${SMTP_HELO_NAME:-databridge.local}
      - SMTP_CONNECT_TIMEOUT_SECONDS=${SMTP_CONNECT_TIMEOUT_SECONDS:-8}
      - SMTP_READ_TIMEOUT_SECONDS=${SMTP_READ_TIMEOUT_SECONDS:-8}
      - SMTP_MAX_MX_HOSTS=${SMTP_MAX_MX_HOSTS:-3}
      - EMAIL_VALIDATION_CONCURRENCY=${EMAIL_VALIDATION_CONCURRENCY:-20}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
